image: node:alpine
cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/
    - .npm/

stages:
  - validate
  - test
  - build
  - release
  - deploy

install:
  stage: .pre
  script:
    - npm ci

lint:
  stage: validate
  rules:
    - if: '$CI_COMMIT_TAG != null'
      when: never
    - if: '$CI_COMMIT_TITLE =~ /^chore: release/'
      when: never
    - when: on_success
  script:
    - npm run lint

only-canary:
  stage: validate
  rules:
    - if: '$ENV_TARGET == "canary"'
      when: on_success
    - when: never
  script:
    - echo "Hello Only Canary !"

unit-test:
  stage: test
  rules:
    - if: '$CI_COMMIT_TAG != null'
      when: never
    - if: '$CI_COMMIT_TITLE =~ /^chore: release/'
      when: never
    - when: on_success
  script:
    - npm test

e2e-test:
  stage: test
  rules:
    - if: '$CI_MERGE_REQUEST_IID'
      when: on_success
    - when: never
  script:
    - echo "Hello E2E !"

release:
  image: node:latest
  stage: release
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"
        && $CI_COMMIT_TAG == null
        && $CI_COMMIT_TITLE !~ /^chore(release): v/'
  before_script:
    - git config user.email $GITLAB_USER_EMAIL
    - git config user.name $GITLAB_USER_NAME
    - git remote set-url origin
      "https://gitlab-ci-token:$GITLAB_TOKEN@$CI_SERVER_HOST/$CI_PROJECT_PATH.git"
    - git checkout $CI_COMMIT_BRANCH
    - git pull origin $CI_COMMIT_BRANCH --rebase
  script:
    - npx --yes release-it --ci
